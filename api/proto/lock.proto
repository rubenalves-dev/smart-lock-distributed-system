syntax = "proto3";

package lock;

import "google/protobuf/timestamp.proto";

// Generate Go code in this dir
option go_package = "backend/internal/gen/smartlock";

// --- SERVICES ---

// The AI Service analyses behavior patterns
service AIService {
    // Synchronous prediction for real-time security
    rpc PredictSeverity(PredictSeverityRequest) returns (PredictSeverityResponse);

    // Triggered via Web Ap to retrain models
    rpc RetrainModel(RetrainModelRequest) returns (RetrainModelResponse);
}

// Main server / Auth Service
service LockService {
    rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);
    rpc RemoteUnlock(RemoteUnlockRequest) returns (RemoteUnlockResponse);
    // buf:lint:ignore RPC_REQUEST_STANDARD_NAME
    rpc GetSystemHealth(Empty) returns (GetSystemHealthResponse);
}

// --- MESSAGES ---
message Empty {}

enum Severity {
    SEVERITY_OK_UNSPECIFIED = 0;
    SEVERITY_IRREGULAR = 1;
    SEVERITY_SUSPICIOUS = 2;
    SEVERITY_CRITICAL = 3;
}

// Data coming from ESP32 or stored in DB for AI
message SensorEvent {
    string device_id = 1;
    float vibration_intensity = 2;
    string entry_method = 3;
    bool success = 4;
    google.protobuf.Timestamp timestamp = 5;
}

message PredictSeverityRequest {
    repeated SensorEvent events = 1;
}

message PredictSeverityResponse {
    Severity classification = 1;
    float confidence = 2;
    string recommendation = 3; // e.g., "Request MFA" or "Notify Owner" // TODO: Transform into an enum?
}

// Auth data from RFID/Fingerprint
message AuthenticateUserRequest {
    string device_id = 1;
    string auth_type = 2; // "nfc" or "fingerprint"
    string credential_payload = 3; // The ID of the chip or finger index
}

message AuthenticateUserResponse {
    bool authorized = 1;
    string user_name = 2; // if success
}

message RemoteUnlockRequest {
    string requester_id = 1; // e.g., user name or device ID
    string secret_key = 2; // For simplicity, a shared secret or token
}

message RemoteUnlockResponse {
    bool success = 1;
    string message = 2;
}

message RetrainModelResponse {
    bool success = 1;
    string message = 2;
}

message GetSystemHealthResponse {
    string service_name = 1;
    string status = 2; // "OK", "DEGRADED", "DOWN"
    float cpu_usage = 3; // in percentage
    float memory_usage = 4; // in percentage
}

message RetrainModelRequest {
    string dataset_path = 1;
    int32 epochs = 2;
}
